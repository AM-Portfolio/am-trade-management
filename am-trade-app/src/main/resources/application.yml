# Application specific common settings
am:
  trade:
    kafka:
      enabled: true
    api:
      enabled: true
    common:
      enabled: true
      date-format: yyyy-MM-dd'T'HH:mm:ss.SSS
    services:
      enabled: true
      retry:
        max-attempts: 3
        backoff-multiplier: 2.0
      circuit-breaker:
        failure-threshold: 40
        reset-timeout-seconds: 60
    dashboard:
      enabled: true
      metrics:
        collection-interval-seconds: 60
        retention-days: 30
  observability:
    enabled: ${AM_OBSERVABILITY_ENABLED:true}
    request-log:
      enabled: ${AM_OBSERVABILITY_REQUEST_LOG_ENABLED:true}
      ignore-paths: /actuator/**,/favicon.ico
    sanitize:
      preview-bytes: ${AM_OBSERVABILITY_SANITIZE_PREVIEW_BYTES:256}

server:
  port: 8080

spring:
  application:
    name: am-trade-management
  config:
    import:
      - classpath:application-common.yml
      - optional:file:/vault/secrets/app
      - optional:file:/vault/secrets/mongo
      - optional:file:/vault/secrets/kafka
      - optional:file:/vault/secrets/redis
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE:trade}
      auto-index-creation: false
      # ssl:
      #   enabled: true
      #   invalid-hostname-allowed: false
    jackson:
      default-property-inclusion: non_null
      serialization:
        write-dates-as-timestamps: false
      deserialization:
        fail-on-unknown-properties: false
      date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka.dev.svc.cluster.local:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME:kafkaUser}" password="${KAFKA_SASL_PASSWORD:kafkaPassword123!}";}
    consumer:
      group-id: am-trade-management
      auto-offset-reset: latest
    trade-topic: ${KAFKA_TOPICS_TRADE_EVENTS:am-trade}

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    enabled: true
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      validate-group-membership: false
      group:
        readiness:
          include: mongo,redis,kafka,readinessState,diskSpace
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mongo:
      enabled: true
    redis:
      enabled: true
    kafka:
      enabled: true

# OpenTelemetry service metadata
otel:
  service:
    name: ${spring.application.name}
    namespace: am-trade-management

# Logging configuration
logging:
  level:
    root: INFO
    am.trade: INFO
    org.springframework.data.mongodb: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
