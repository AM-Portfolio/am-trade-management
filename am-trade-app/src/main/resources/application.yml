# MONGODB_URI: 
# MONGODB_DATABASE: trade_management

# KAFKA_BOOTSTRAP_SERVERS: localhost:9092
# KAFKA_SECURITY_PROTOCOL: PLAINTEXT
# KAFKA_SASL_MECHANISM: PLAIN
KAFKA_SASL_JAAS_CONFIG: #org.apache.kafka.common.security.plain.PlainLoginModule required username="kafkaUser" password="kafkaPassword123!";

# Application specific common settings
app:
  kafka:
    enabled: false

am:
  trade:
    kafka:
      enabled: true
    api:
      enabled: true
    common:
      enabled: true
      date-format: yyyy-MM-dd'T'HH:mm:ss.SSS
    services:
      enabled: true
      retry:
        max-attempts: 3
        backoff-multiplier: 2.0
      circuit-breaker:
        failure-threshold: 40
        reset-timeout-seconds: 60
    dashboard:
      enabled: true
      metrics:
        collection-interval-seconds: 60
        retention-days: 30
server:
  port: 8073

spring:
  application:
    name: am-trade-management
  config:
    import:
      - classpath:application-common.yml
      - classpath:application-redis.yml
      - classpath:application-market-data-client.yml
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:password123@localhost:27017/trade_management?authSource=admin}
      database: ${MONGODB_DATABASE:trade_management}
      field-naming-strategy: org.springframework.data.mapping.model.SnakeCaseFieldNamingStrategy
      # ssl:
      #   enabled: true 
      #   invalid-hostname-allowed: false
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG}
      session.timeout.ms: 60000
      heartbeat.interval.ms: 20000
      max.poll.interval.ms: 300000
    consumer:
      group-id: am-trade-management
      auto-offset-reset: latest
    trade-topic: ${KAFKA_TOPICS_TRADE_EVENTS:am-trade}
  security:
    oauth2:
      resourceserver:
        jwt:
          # TODO: Replace with your Identity Provider's JWK Set URI
          # Example: https://idp.example.com/.well-known/jwks.json
          jwk-set-uri: ${JWT_JWK_SET_URI:https://your-idp-url/.well-known/jwks.json}
          # Or use issuer-uri if you want Spring to discover the JWK Set URI
          # issuer-uri: ${JWT_ISSUER_URI:https://your-idp-url}

jwt:
  secret: ${JWT_SECRET:internal-service-super-secret-key-32chars-minimum-change-in-prod}

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      validate-group-membership: false
      group:
        readiness:
          include: mongodb,kafka,diskSpace
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mongo:
      enabled: false

# Logging configuration
logging:
  level:
    root: INFO
    am.trade: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
