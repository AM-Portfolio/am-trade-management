name: Publish SDKs

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (optional)'
        required: false
  workflow_call:

jobs:
  publish-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cp settings.xml ~/.m2/settings.xml

      - name: Publish to GitHub Packages
        run: mvn deploy -pl am-trade-sdk-core -am -DskipTests
        env:
          GITHUB_PACKAGES_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-python:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Package
        working-directory: ./am-trade-sdk-python
        run: python -m build

      - name: Determine Tag Name
        id: tag
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME"

      - name: Create Release (if needed)
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          
          # Check if release already exists
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
          else
            echo "Creating release $TAG_NAME"
            gh release create "$TAG_NAME" \
              --title "SDK Release - $TAG_NAME" \
              --notes "Python SDK version $TAG_NAME" \
              --draft=false
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        working-directory: ./am-trade-sdk-python
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          echo "Uploading Python SDK to release tag: $TAG_NAME"
          gh release upload "$TAG_NAME" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI (Alternative - Optional)
        working-directory: ./am-trade-sdk-python
        run: |
          # Uncomment to also publish to PyPI
          # twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
          echo "PyPI publishing disabled - currently publishing to GitHub Releases only"
        env:
          TWINE_REPOSITORY_URL: https://upload.pypi.org/legacy/
