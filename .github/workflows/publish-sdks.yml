name: Publish SDKs

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Build with Maven
        run: mvn -B package --file am-trade-sdk-core/pom.xml

      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests --file am-trade-sdk-core/pom.xml -s $GITHUB_WORKSPACE/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Package
        working-directory: ./am-trade-sdk-python
        run: python -m build

      - name: Publish to GitHub Packages
        working-directory: ./am-trade-sdk-python
        run: |
          twine upload dist/* --repository-url https://pypi.pkg.github.com/AM-Portfolio/am-trade-management
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
