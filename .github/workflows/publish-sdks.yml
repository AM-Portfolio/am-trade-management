name: Publish SDKs

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (optional)'
        required: false
  workflow_call:

jobs:
  publish-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cp settings.xml ~/.m2/settings.xml

      - name: Publish to GitHub Packages
        run: mvn deploy -pl am-trade-sdk-core -am -DskipTests
        env:
          GITHUB_PACKAGES_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-python:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Package
        working-directory: ./am-trade-sdk-python
        run: python -m build

      - name: Publish to GitHub Release
        working-directory: ./am-trade-sdk-python
        run: |
          TAG_NAME="${{ inputs.tag_name || github.event.release.tag_name || github.ref_name }}"
          echo "Uploading to release tag: $TAG_NAME"
          gh release upload "$TAG_NAME" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
