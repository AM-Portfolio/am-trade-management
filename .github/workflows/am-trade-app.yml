name: AM Trade Management App Deploy

on:
  push:
    branches: ["main", "develop", "test/**", "trade-managemnet-study", "TM-features/**", "features/**", "dev"]
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/*.yml'
  pull_request:
    branches: ["main", "develop", "test/**", "features/**", "dev"]
    paths:
      - '**/*.java'
      - '**/pom.xml'
  workflow_dispatch:
    inputs:
      deployment_approval:
        description: 'Set to true to approve deployment'
        required: true
        type: boolean
        default: false
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - local
          - dev
          - preprod
          - prod
          - all
        default: dev

jobs:
  publish:
    name: Build, Publish and Deploy App
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@develop
    with:
      language: 'java'
      working_directory: '.'
      image_name: 'am-trade-management-service'
      dev_namespace: 'am-apps-dev'
      preprod_namespace: 'am-apps-preprod'
      prod_namespace: 'am-apps-prod'
      deploy_dev: true
      deploy_prod: true
    secrets: inherit

  # Standalone Local Deployment (as requested for the 'local' cluster environment)
  deploy-local:
    name: Deploy to Local Cluster
    needs: [publish] # Runs after the build/publish stage
    permissions:
      contents: read
      packages: write
      id-token: write
    environment: local
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@develop
    with:
      language: 'java'
      working_directory: '.'
      image_name: 'am-trade-management-service'
      preprod_namespace: 'am-apps-local'
      deploy_dev: false
      deploy_prod: false
    secrets: inherit
