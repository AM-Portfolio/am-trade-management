name: AM Trade Management App Deploy

on:
  push:
    branches: ["main", "develop", "test/**", "trade-managemnet-study", "TM-features/**", "features/**"]
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/*.yml'
  pull_request:
    branches: ["main", "develop", "test/**", "features/**"]
    paths:
      - '**/*.java'
      - '**/pom.xml'
  workflow_dispatch:
    inputs:
      deployment_approval:
        description: 'Set to true to approve deployment'
        required: true
        type: boolean
        default: false
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - preprod
          - prod
          - all
        default: preprod

jobs:
  publish:
    name: Build, Publish and Deploy App
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: 'java'
      working_directory: '.'
      image_name: 'am-trade-management-service'
      preprod_namespace: 'am-apps-preprod'
      prod_namespace: 'am-apps-prod'
      deploy_prod: true
    secrets: inherit

  deploy-dev:
    name: Deploy to Dev (Parallel)
    environment: dev
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: 'java'
      working_directory: '.'
      image_name: 'am-trade-management-service'
      preprod_namespace: 'am-apps-dev'
      deploy_prod: false
    secrets: inherit
