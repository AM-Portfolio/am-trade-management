name: AM Trade Management App Deploy

on:
  push:
    branches: ["main", "develop", "test/**", "trade-managemnet-study", "TM-features/**"]
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - 'Dockerfile'
      - 'helm/**'
  pull_request:
    branches: ["main", "develop", "test/**"]
    paths:
      - '**/*.java'
      - '**/pom.xml'
  workflow_dispatch:

jobs:
  publish:
    name: Build, Publish and Deploy App
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: 'java'
      working_directory: '.'
      image_name: 'am-trade-management-service'
      preprod_namespace: 'am-apps-preprod'
      prod_namespace: 'am-apps-prod'
      deploy_prod: true
    secrets: inherit
