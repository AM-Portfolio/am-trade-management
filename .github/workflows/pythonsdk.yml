name: Publish Python SDK to PyPI

on:
  push:
    branches:
      - "**"
      - feature/**
      - feature/sdk
  workflow_dispatch:  # Manual trigger only
    inputs:
      pypi_api_token:
        description: 'PyPI API Token'
        required: false
        type: string

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel twine

      - name: Build distribution
        working-directory: ./am-trade-sdk-python
        run: |
          python -m build

      - name: Display build artifacts
        working-directory: ./am-trade-sdk-python
        run: |
          echo "=== Build Artifacts ==="
          ls -lh dist/

      - name: Publish to PyPI
        working-directory: ./am-trade-sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "Publishing am-trade-sdk to PyPI..."
          python -m twine upload dist/* \
            --skip-existing \
            --non-interactive \
            --verbose
        continue-on-error: true

      - name: Verify PyPI Publication
        run: |
          echo "Package published! Verify at:"
          echo "https://pypi.org/project/am-trade-sdk/"
          echo ""
          echo "Install with: pip install am-trade-sdk"

  publish-test-pypi:
    runs-on: ubuntu-latest
    name: Publish to TestPyPI (Optional)
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel twine

      - name: Build distribution
        working-directory: ./am-trade-sdk-python
        run: |
          python -m build

      - name: Publish to TestPyPI
        working-directory: ./am-trade-sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          echo "Publishing am-trade-sdk to TestPyPI..."
          python -m twine upload dist/* \
            --repository testpypi \
            --skip-existing \
            --non-interactive \
            --verbose || true

      - name: Verify TestPyPI Publication
        run: |
          echo "Test package published! Verify at:"
          echo "https://test.pypi.org/project/am-trade-sdk/"
          echo ""
          echo "Test install with: pip install -i https://test.pypi.org/simple/ am-trade-sdk"
