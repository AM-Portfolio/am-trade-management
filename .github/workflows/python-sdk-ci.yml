name: Python SDK CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./am-trade-sdk-python
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          # Install the package in editable mode with dev dependencies (pytest, etc.)
          pip install -e .[dev]

      - name: Run Tests
        working-directory: ./am-trade-sdk-python
        run: pytest

      - name: Build Package
        working-directory: ./am-trade-sdk-python
        run: python -m build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist
          path: am-trade-sdk-python/dist/*
