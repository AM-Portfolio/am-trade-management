name: Python SDK CI

on:
  push:
    branches:
      - "**"
      - feature/**
  pull_request:
    branches:
      - "**"
      - feature/**
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check and fix file encoding
        working-directory: ./am-trade-sdk-python
        run: |
          echo "Checking Python files for encoding issues..."
          find . -name "*.py" -type f | while read file; do
            if file "$file" | grep -q "UTF-8"; then
              echo "OK: $file"
            else
              echo "WARNING: $file may have encoding issues"
              dos2unix "$file" 2>/dev/null || sed -i 's/\r$//' "$file"
            fi
          done

      - name: Install dependencies
        working-directory: ./am-trade-sdk-python
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          # Install the package in editable mode with dev dependencies (pytest, etc.)
          pip install -e .[dev]
          # Explicitly install jwt dependency
          pip install PyJWT>=2.8.0

      - name: Run Tests
        working-directory: ./am-trade-sdk-python
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: 1
        run: pytest --tb=short -v

      - name: Build Package
        working-directory: ./am-trade-sdk-python
        run: python -m build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist
          path: am-trade-sdk-python/dist/*
