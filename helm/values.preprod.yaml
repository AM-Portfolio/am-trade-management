# Pre-production configuration for am-trade-management.
# Aligned with am-market industry standards.

environment: "preprod"

global:
  vault:
    enabled: true
    secrets:
      auth:
        path: "apps/data/preprod/services/am-auth"
      infra:
        path: "apps/data/preprod/infra/shared-api"
      mongo:
        path: "apps/data/preprod/infra/mongodb"
      kafka:
        path: "apps/data/preprod/infra/kafka"
      redis:
        path: "apps/data/preprod/infra/redis"
      app:
        path: "apps/data/preprod/services/am-trade-management"
env:
  SPRING_PROFILES_ACTIVE: "preprod"
  TRACING_SAMPLING_PROBABILITY: "1.0"
  AM_OBSERVABILITY_ENABLED: "true"
  AM_OBSERVABILITY_REQUEST_LOG_ENABLED: "true"
  LOG_FILE: "/var/log/am-trade/application-preprod.log"

ingress:
  enabled: true
  hosts:
    - host: trade.preprod.amportfolio.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
