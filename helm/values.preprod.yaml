# Pre-production configuration for am-trade-management.
# Aligned with am-market industry standards.

environment: "preprod"

vault:
  enabled: true
  role: "am-trade-management"
  secretPaths:
    infra: "kv/data/preprod/infra"
    mongo: "apps/data/preprod/apps/trade/database/mongo"
    kafka: "apps/data/preprod/apps/trade/kafka"
    redis: "apps/data/preprod/apps/trade/database/redis"
    app: "apps/data/preprod/apps/trade"

env:
  SPRING_PROFILES_ACTIVE: "preprod"

ingress:
  enabled: true
  hosts:
    - host: trade.preprod.amportfolio.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
