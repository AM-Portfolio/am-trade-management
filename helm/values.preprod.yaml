# Pre-production configuration for am-trade-management.
# Aligned with am-market industry standards.

environment: "preprod"

vault:
  enabled: true
  secretPaths:
    database: "kv/preprod/database/mongo"
    kafka: "kv/preprod/kafka"
    redis: "kv/preprod/redis"

env:
  SPRING_PROFILES_ACTIVE: "preprod"
  MONGODB_URI: "mongodb://trade-db-user:T0kenS3cr3t@mongodb-cluster.am-apps-preprod.svc.cluster.local:27017/am-trade"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster.am-apps-preprod.svc.cluster.local:9092"
  KAFKA_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"preprodUser\" password=\"preprodPass\";"
  REDIS_HOST: "redis-cluster.am-apps-preprod.svc.cluster.local"
  REDIS_PASSWORD: "preprodRedisPass"

ingress:
  enabled: true
  hosts:
    - host: trade.preprod.amportfolio.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
