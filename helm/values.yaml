# Base values for am-trade-management service
# Aligned with am-market industry standards.
# Reference: am-core-services/am-gateway

global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: false
    role: "am-trade-management"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-trade-management-sa"

replicaCount: 1
port: 8080
language: java

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "am-trade-management-sa"

security:
  automountServiceAccountToken: true

podAnnotations: {}
image:
  repository: am-trade-management-service

service:
  type: ClusterIP
  port: 8080

# Health probe configuration (Spring Boot Actuator)
probes:
  port: 8080
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: trade.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Default resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Environment label
environment: "default"

# Key application environment variables
env:
  SPRING_PROFILES_ACTIVE: "default"
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
  TZ: "UTC"
