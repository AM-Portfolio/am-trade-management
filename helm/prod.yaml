# Production environment configuration for am-trade-management.
# Aligned with am-market industry standards.

environment: prod

spring:
  profiles:
    active: prod
  mongodb:
    uri: "mongodb://trade-db-user:T0kenS3cr3t@mongodb-cluster.am-apps-prod.svc.cluster.local:27017/portfolio"
    database: "portfolio"
  kafka:
    bootstrapServers: "kafka-cluster.am-apps-prod.svc.cluster.local:9092"
    tradeTopic: "am-trade"
    security:
      protocol: "SASL_SSL"
      saslMechanism: "SCRAM-SHA-512"
      saslJaasConfig: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"prodUser\" password=\"prodPass\";"
  redis:
    host: "redis-cluster.am-apps-prod.svc.cluster.local"
    port: 6379
    password: "prodRedisPass"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: trade.amportfolio.com
      paths:
        - path: /
          pathType: Prefix

vault:
  enabled: true
  secretPaths:
    database: "kv/prod/database/mongo"
    kafka: "kv/prod/kafka"
    redis: "kv/prod/redis"

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi
