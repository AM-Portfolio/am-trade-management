apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "am-trade-management.fullname" . }}
  labels:
    {{- include "am-trade-management.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "am-trade-management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "am-trade-management.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "am-trade-management.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.spring.profiles.active | quote }}
            - name: MONGODB_URI
              value: {{ .Values.spring.mongodb.uri | quote }}
            - name: MONGODB_DATABASE
              value: {{ .Values.spring.mongodb.database | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.spring.kafka.bootstrapServers | quote }}
            - name: KAFKA_TRADE_TOPIC
              value: {{ .Values.spring.kafka.tradeTopic | quote }}
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.spring.kafka.security.protocol | quote }}
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.spring.kafka.security.saslMechanism | quote }}
            - name: KAFKA_SASL_JAAS_CONFIG
              value: {{ .Values.spring.kafka.security.saslJaasConfig | quote }}
            - name: REDIS_HOST
              value: {{ .Values.spring.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.spring.redis.port | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.spring.redis.password | quote }}
          {{- if .Values.vault.enabled }}
          volumeMounts:
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          {{- end }}
      {{- if .Values.vault.enabled }}
      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "am-trade-management.fullname" . }}-secrets
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
