apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "am-trade-management.fullname" . }}
  labels:
    {{- include "am-trade-management.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "am-trade-management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "am-trade-management.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.spring.profiles.active | quote }}
            - name: MONGODB_URI
              value: {{ .Values.spring.mongodb.uri | quote }}
            - name: MONGODB_DATABASE
              value: {{ .Values.spring.mongodb.database | default "am-trade" | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.spring.kafka.bootstrapServers | quote }}
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.spring.kafka.security.protocol | quote }}
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.spring.kafka.security.saslMechanism | quote }}
            - name: KAFKA_SASL_JAAS_CONFIG
              value: {{ .Values.spring.kafka.security.saslJaasConfig | quote }}
            - name: KAFKA_TOPICS_TRADE_EVENTS
              value: {{ .Values.spring.kafka.tradeTopic | default "am-trade" | quote }}
            - name: REDIS_HOSTNAME
              value: {{ .Values.spring.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.spring.redis.port | default "6379" | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.spring.redis.password | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
