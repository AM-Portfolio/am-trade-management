# Local development values for am-trade-management.
replicaCount: 1

spring:
  profiles:
    active: local
  mongodb:
    uri: "mongodb://localhost:27017/am-trade"
  kafka:
    bootstrapServers: "localhost:9092"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
