# Local environment configuration for am-trade-management.
# Inspired by am-market local development patterns.

replicaCount: 1

spring:
  profiles:
    active: local
  mongodb:
    uri: "mongodb://trade-db-user:T0kenS3cr3t@mongodb-cluster.am-apps-local.svc.cluster.local:27017/portfolio"
    database: "portfolio"
  kafka:
    bootstrapServers: "kafka-cluster.am-apps-local.svc.cluster.local:9092"
    tradeTopic: "am-trade"
    security:
      protocol: "SASL_PLAINTEXT"
      saslMechanism: "PLAIN"
      saslJaasConfig: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"localUser\" password=\"localPass\";"
  redis:
    host: "redis-cluster.am-apps-local.svc.cluster.local"
    port: 6379
    password: "localRedisPass"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: trade.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
