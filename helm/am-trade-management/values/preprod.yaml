# Pre-production environment configuration for am-trade-management.
# Aligned with am-market industry standards.

environment: preprod

spring:
  profiles:
    active: preprod
  mongodb:
    uri: "mongodb://trade-db-user:T0kenS3cr3t@mongodb-cluster.am-apps-preprod.svc.cluster.local:27017/portfolio"
    database: "portfolio"
  kafka:
    bootstrapServers: "kafka-cluster.am-apps-preprod.svc.cluster.local:9092"
    tradeTopic: "am-trade"
    security:
      protocol: "SASL_PLAINTEXT"
      saslMechanism: "PLAIN"
      saslJaasConfig: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"preprodUser\" password=\"preprodPass\";"
  redis:
    host: "redis-cluster.am-apps-preprod.svc.cluster.local"
    port: 6379
    password: "preprodRedisPass"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: trade.preprod.amportfolio.com
      paths:
        - path: /
          pathType: Prefix

vault:
  enabled: true
  secretPaths:
    database: "kv/preprod/database/mongo"
    kafka: "kv/preprod/kafka"
    redis: "kv/preprod/redis"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
