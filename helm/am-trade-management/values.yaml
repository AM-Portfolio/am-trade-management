# Default values for am-trade-management.

replicaCount: 1

image:
  repository: ghcr.io/am-portfolio/am-trade-management-service
  pullPolicy: IfNotPresent
  # The tag is dynamically injected by the central am-pipelines CI/CD!
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: trade.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

spring:
  profiles:
    active: default
  mongodb:
    uri: ""
  kafka:
    bootstrapServers: ""
