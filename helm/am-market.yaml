# Standard am-market environment configuration for am-trade-management.
# Aligned with am-market industry standards.

replicaCount: 1

image:
  repository: ghcr.io/am-portfolio/am-trade-management-service
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
