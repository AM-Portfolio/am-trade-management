# Production configuration for am-trade-management.
# Aligned with am-market industry standards.

replicaCount: 2

environment: "prod"

vault:
  enabled: true
  secretPaths:
    database: "kv/prod/database/mongo"
    kafka: "kv/prod/kafka"
    redis: "kv/prod/redis"

env:
  SPRING_PROFILES_ACTIVE: "prod"
  MONGODB_URI: "mongodb://trade-db-user:T0kenS3cr3t@mongodb-cluster.am-apps-prod.svc.cluster.local:27017/am-trade"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster.am-apps-prod.svc.cluster.local:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"
  KAFKA_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"prodUser\" password=\"prodPass\";"
  REDIS_HOST: "redis-cluster.am-apps-prod.svc.cluster.local"
  REDIS_PASSWORD: "prodRedisPass"

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: trade.amportfolio.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi
