# Production configuration for am-trade-management.
# Aligned with am-market industry standards.

replicaCount: 2

environment: "prod"

global:
  vault:
    enabled: true
    secrets:
      infra:
        path: "kv/data/prod/infra"
      mongo:
        path: "apps/data/prod/apps/trade/database/mongo"
      kafka:
        path: "apps/data/prod/apps/trade/kafka"
      redis:
        path: "apps/data/prod/apps/trade/database/redis"
      app:
        path: "apps/data/prod/apps/trade"

env:
  SPRING_PROFILES_ACTIVE: "prod"
  TRACING_SAMPLING_PROBABILITY: "0.1"
  AM_OBSERVABILITY_ENABLED: "true"
  AM_OBSERVABILITY_REQUEST_LOG_ENABLED: "true"
  LOG_FILE: "/var/log/am-trade/application-prod.log"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: trade.amportfolio.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi
