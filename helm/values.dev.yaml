# Development configuration for am-trade-management.
# Aligned with am-market industry standards.

replicaCount: 1

environment: "dev"

env:
  SPRING_PROFILES_ACTIVE: "dev"
  TRACING_SAMPLING_PROBABILITY: "1.0"
  AM_OBSERVABILITY_ENABLED: "true"
  AM_OBSERVABILITY_REQUEST_LOG_ENABLED: "true"

global:
  vault:
    enabled: true
    secrets:
      infra:
        path: "apps/data/dev/infra/shared-api"
      mongo:
        path: "apps/data/dev/infra/mongodb"
      kafka:
        path: "apps/data/dev/infra/kafka"
      redis:
        path: "apps/data/dev/infra/redis"
      app:
        path: "apps/data/dev/services/am-trade-management"

ingress:
  enabled: true
  hosts:
    - host: trade-dev.amportfolio.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi
