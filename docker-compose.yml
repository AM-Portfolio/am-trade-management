version: '3.8'

services:
  # --- Trade Management Backend (Spring Boot) ---
  am-trade-service:
    container_name: am-trade-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GITHUB_PACKAGES_USERNAME=${GITHUB_PACKAGES_USERNAME}
        - GITHUB_PACKAGES_TOKEN=${GITHUB_PACKAGES_TOKEN}
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      
      # Database
      - MONGODB_URI=${MONGODB_URL}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD} Mereba
      - MONGODB_AUTHENTICATION_DATABASE=admin
      
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - SPRING_KAFKA_CONSUMER_GROUP_ID=${KAFKA_CONSUMER_GROUP_ID}
      
      # Redis
      - REDIS_HOSTNAME=${REDIS_HOSTNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=${REDIS_PORT}
      
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}

    ports:
      - "8040:8073"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - am-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8073/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Trade Dashboard (Flutter) ---
  # am-trade-dashboard:
  #   container_name: am-trade-dashboard
  #   build:
  #     context: ./am-trade-dashboard
  #     dockerfile: Dockerfile
  #   ports:
  #     - "9003:80"
  #   networks:
  #     - am-network
  #   restart: unless-stopped

networks:
  am-network:
    external: true
    name: am-infra_am-net
