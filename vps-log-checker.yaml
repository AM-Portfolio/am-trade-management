apiVersion: v1
kind: Pod
metadata:
  name: journal-checker
spec:
  hostPID: true
  containers:
  - name: shell
    image: alpine
    securityContext:
      privileged: true
    command: ["nsenter", "--target", "1", "--mount", "--uts", "--ipc", "--net", "--pid", "--", "sh", "-c", "ls -l /var/log/journal || echo 'No persistent journal'"]
  restartPolicy: Never
